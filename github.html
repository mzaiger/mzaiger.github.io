<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>GitHub Repositories</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<script src="components.js"></script>
<div class="container">
  <h1 id="typewriter-text">GitHub Repositories</h1>

  <div class="github-status" id="githubStatus">
    <div class="github-spinner"></div>
    Loading repositories from GitHub&hellip;
  </div>

  <div class="column-container-project" id="githubGrid"></div>
</div>
<footer>© Marc Zaiger</footer>

<script>
(function () {
  const GITHUB_USER = 'mzaiger';
  const statusEl = document.getElementById('githubStatus');
  const gridEl = document.getElementById('githubGrid');

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function renderRepos(repos) {
    gridEl.innerHTML = '';

    if (repos.length === 0) {
      statusEl.style.display = '';
      statusEl.textContent = 'No repositories found.';
      return;
    }

    statusEl.style.display = 'none';

    repos.forEach(repo => {
      const repoUrl = repo.html_url;
      const liveUrl = `https://marcitech.is-a.dev/${repo.name}`;

      const column = document.createElement('div');
      column.className = 'column';

      column.innerHTML = `
        <div class="project-card">
          <div class="github-iframe-wrapper">
            <div class="loading-bar"></div>
            <iframe class="github-iframe" src="${liveUrl}" title="${escapeHTML(repo.name)} live site" loading="lazy"></iframe>
          </div>
          <h2>${escapeHTML(repo.name)}</h2>
          <p class="project-desc">&nbsp;&nbsp;&nbsp;&nbsp;
            ${repo.description ? escapeHTML(repo.description) : 'No description provided.'}
          </p>
          <p><a href="${repoUrl}" target="_blank">${repoUrl}</a></p>
          <p><a href="${liveUrl}" target="_blank">${liveUrl}</a></p>
        </div>
      `;
      gridEl.appendChild(column);

      // Drive the loading bar + fade-in for this card's iframe,
      // same behavior as the #myFrame logic in components.js
      const iframeEl = column.querySelector('.github-iframe');
      const barEl = column.querySelector('.loading-bar');

      setTimeout(() => { barEl.style.width = '30%'; }, 100);
      setTimeout(() => { barEl.style.width = '70%'; }, 1000);

      iframeEl.onload = () => {
        barEl.style.width = '100%';
        iframeEl.style.opacity = '1';
        setTimeout(() => { barEl.classList.add('fade-out'); }, 300);
      };
    });

    // Re-trigger the existing fade-in observer used across the site
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('show');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.project-card').forEach(card => observer.observe(card));
  }

  async function loadRepos() {
    try {
      const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=pushed`);

      if (!res.ok) {
        if (res.status === 403) {
          throw new Error('GitHub API rate limit reached. Please refresh again in a bit.');
        }
        throw new Error(`GitHub API returned ${res.status}`);
      }

      const data = await res.json();

      // Sort: original repos first (by most recently pushed), then forks
      const EXCLUDED_REPOS = [`${GITHUB_USER}.github.io`, 'register'];

      const repos = data
        .filter(repo => !EXCLUDED_REPOS.includes(repo.name.toLowerCase()))
        .sort((a, b) => {
          if (!!a.fork !== !!b.fork) return a.fork ? 1 : -1;
          return new Date(b.pushed_at) - new Date(a.pushed_at);
        });

      renderRepos(repos);
    } catch (err) {
      statusEl.classList.add('error');
      statusEl.textContent = `Couldn't load repositories: ${err.message}`;
    }
  }

  loadRepos();
})();
</script>
</body>
</html>
